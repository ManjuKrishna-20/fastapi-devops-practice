trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:

- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.9'
  displayName: "Use Python"

- script: |
    python -m pip install --upgrade pip
    pip install poetry
    poetry install
  displayName: "Install Dependencies"

- script: |
    poetry run pytest
  displayName: "Run Tests"