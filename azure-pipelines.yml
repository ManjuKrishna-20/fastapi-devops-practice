trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:

- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.10'
  displayName: "Use Python"

- script: |
    python -m pip install --upgrade pip
    pip install poetry
    poetry install
  displayName: "Install dependencies"

- script: |
    echo "Pipeline executed successfully"
  displayName: "Run Build"