trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- checkout: self

- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.10'

- script: |
    python -m pip install --upgrade pip
    pip install poetry
  displayName: Install Poetry

- script: |
    poetry install
  displayName: Install dependencies

- script: |
    poetry run pytest
  displayName: Run tests